<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level One PDF Converter</title>
  <meta name="description" content="Offline, air-gapped PDF to Markdown converter">
  <style>
    /* INJECT:FONTS */
    /* INJECT:STYLES */
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <h1>Level One <span>PDF Converter</span></h1>
    <button id="theme-btn" title="Toggle light/dark">Light / Dark</button>
  </header>

  <!-- Drop zone -->
  <div class="drop-wrapper">
    <div id="drop-zone">
      <div class="drop-icon">📄</div>
      <div class="drop-label">Drop a PDF here or click to browse</div>
      <div class="drop-sub">Text-based and scanned PDFs both supported — OCR is built in, no internet needed</div>
      <button id="browse-btn">Browse PDF</button>
      <input id="file-input" type="file" accept=".pdf,application/pdf" style="display:none">
    </div>
  </div>

  <!-- Progress -->
  <div id="progress-wrap" class="hidden">
    <div id="progress-label">Initialising…</div>
    <div class="progress-track"><div id="progress-bar"></div></div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar" class="hidden">
    <div class="view-group">
      <button id="btn-view-md">Markdown</button>
      <button id="btn-view-preview">Preview</button>
      <button id="btn-view-split">Split</button>
    </div>
    <div class="spacer"></div>
    <button id="btn-copy">Copy</button>
    <button id="btn-download">↓ .md</button>
  </div>

  <!-- Output -->
  <div id="output-area" class="hidden" data-view="split">
    <div class="md-pane">
      <div class="pane-label">Markdown</div>
      <textarea id="md-editor" spellcheck="false"></textarea>
    </div>
    <div class="preview-pane">
      <div class="pane-label">Preview</div>
      <div id="md-preview"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    by <a href="https://www.levelone.co.za" target="_blank" rel="noopener">levelone.co.za</a>
    <span class="sep">|</span>
    <a id="footerVersion" href="https://github.com/levelone-co/level-one-pdf-converter" target="_blank" rel="noopener"></a>
    <div class="btn-container">
      <a class="kofi-button" href="https://ko-fi.com/H2H71XAPZJ" target="_blank" rel="noopener">
        <img id="kofi-cup" class="kofiimg" src="" alt="">Click here to buy me a coffee
      </a>
    </div>
  </footer>

</div>

</html>
